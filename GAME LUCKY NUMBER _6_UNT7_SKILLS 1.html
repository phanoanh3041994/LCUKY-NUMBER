<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lucky Number – People & Programmes</title>

<style>
body{
  font-family: Arial, sans-serif;
  text-align:center;
  background:linear-gradient(#fff7b2,#c8e6c9);
}
h1{margin:10px}

#scoreboard{
  display:flex;
  justify-content:space-around;
  font-size:24px;
  margin:10px;
}
.team{
  background:#fff;
  padding:10px 20px;
  border-radius:12px;
}
#turn{
  font-size:22px;
  font-weight:bold;
  margin:10px;
}
#grid{
  display:grid;
  grid-template-columns:repeat(3,120px);
  gap:20px;
  justify-content:center;
  margin:30px auto;
}
.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#4fc3f7;
  font-size:40px;
  font-weight:bold;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}
.circle:hover{background:#29b6f6}

#questionBox{
  width:75%;
  margin:20px auto;
  padding:20px;
  background:#fff;
  border-radius:15px;
  font-size:30px;
  display:none;
}
.answer{
  background:#e3f2fd;
  margin:12px;
  padding:10px;
  border-radius:10px;
  font-size:24px;
  cursor:pointer;
}
.answer:hover{background:#bbdefb}
.correct{background:#81c784 !important;}
.wrong{background:#e57373 !important;}

#end{
  display:none;
  font-size:40px;
  margin-top:40px;
}
</style>
</head>

<body>

<h1>🎉 LUCKY NUMBER 🎉</h1>

<div id="scoreboard">
  <div class="team">Team A: <span id="scoreA">0</span></div>
  <div class="team">Team B: <span id="scoreB">0</span></div>
</div>

<div id="turn">👉 Team A’s turn</div>

<div id="grid"></div>

<div id="questionBox"></div>

<div id="end"></div>

<!-- ÂM THANH -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="luckySound" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>

<script>
const questions=[
 {
  q:"Phong wants to know more about dogs and cats.",
  a:["The Fox Teacher","Children are Always Right","The Pig Race","The Dolphins"],
  c:1
 },
 {
  q:"Bob likes programmes that make him laugh.",
  a:["Cuc Phuong Forest","The Dolphins","The Fox Teacher","The Pig Race"],
  c:2
 },
 {
  q:"Nga loves learning about plants and animals.",
  a:["The Pig Race","Cuc Phuong Forest","The Dolphins","Children are Always Right"],
  c:1
 },
 {
  q:"Minh likes watching races.",
  a:["The Pig Race","The Dolphins","The Fox Teacher","Cuc Phuong Forest"],
  c:0
 },
 {
  q:"Linh is interested in sea animals.",
  a:["Children are Always Right","The Fox Teacher","The Dolphins","The Pig Race"],
  c:2
 }
];

let used=[];
let lucky=Math.floor(Math.random()*6);
let turn=0;
let score=[0,0];

const grid=document.getElementById("grid");
const qBox=document.getElementById("questionBox");

// tạo 6 ô tròn
for(let i=0;i<6;i++){
 const d=document.createElement("div");
 d.className="circle";
 d.innerText=i+1;
 d.onclick=()=>openBox(i,d);
 grid.appendChild(d);
}

// mở ô
function openBox(i,box){
 if(used.includes(i)) return;

 // xóa câu cũ khi chọn ô mới
 qBox.style.display="none";
 qBox.innerHTML="";

 used.push(i);
 box.style.visibility="hidden";
 qBox.style.display="block";

 if(i===lucky){
   document.getElementById("luckySound").play();
   score[turn]+=15;
   updateScore();
   qBox.innerHTML="🎉 <b>Lucky Number!</b><br>You get <b>15 points</b>!";
   switchTurn();
   return;
 }

 let q=questions.shift();
 qBox.innerHTML="<b>"+q.q+"</b><br>";
 q.a.forEach((ans,index)=>{
  const div=document.createElement("div");
  div.className="answer";
  div.innerText=ans;
  div.onclick=()=>check(div,index,q.c);
  qBox.appendChild(div);
 });
}

// kiểm tra đáp án
function check(div,i,c){
 const answers=document.querySelectorAll(".answer");
 answers.forEach(a=>a.onclick=null);

 if(i===c){
  div.classList.add("correct");
  document.getElementById("correctSound").play();
  score[turn]+=10;
 }else{
  div.classList.add("wrong");
  answers[c].classList.add("correct");
  document.getElementById("wrongSound").play();
 }
 updateScore();
 switchTurn();
}

// đổi lượt
function switchTurn(){
 turn=1-turn;
 document.getElementById("turn").innerText=
   turn===0?"👉 Team A’s turn":"👉 Team B’s turn";

 if(used.length===6) endGame();
}

// cập nhật điểm
function updateScore(){
 document.getElementById("scoreA").innerText=score[0];
 document.getElementById("scoreB").innerText=score[1];
}

// kết thúc
function endGame(){
 const end=document.getElementById("end");
 end.style.display="block";
 if(score[0]>score[1]) end.innerHTML="🎉 TEAM A WINS!";
 else if(score[1]>score[0]) end.innerHTML="🎉 TEAM B WINS!";
 else end.innerHTML="🤝 DRAW!";
}
</script>

</body>
</html>
